name: CI/CD FORECASTER - RENDER

on:
  push:
    branches: [main]
    paths:
      - 'forecaster/**'
      - '.github/workflows/forecaster-ci-cd.yml'
  pull_request:
    branches: [main]
    paths:
      - 'forecaster/**'
      - '.github/workflows/forecaster-ci-cd.yml'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  # ── CI ──────────────────────────────────────────────
  lint:
    name: Lint Forecaster
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forecaster
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'forecaster/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r requirements.txt

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Ruff Formatter Check
        run: ruff format --check .

  syntax-check:
    name: Syntax & Import Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forecaster
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'forecaster/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files (syntax check)
        run: python -m py_compile main.py

      - name: Check imports
        run: python -c "from main import app; print('FastAPI app imports OK')"

  # ── CD – Deploy to Render (only on main push) ──────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [lint, syntax-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_FORECASTER_DEPLOY_HOOK }}"
