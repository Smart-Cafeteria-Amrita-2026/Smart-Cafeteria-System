name: BUILD - SMART CAFETERIA MANAGEMENT

on:
  push:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build.yml'
  workflow_call:
    inputs:
      project:
        description: 'Project to build (backend or frontend). Omit to build both.'
        required: false
        type: string

jobs:
  build:
    name: Build ${{ matrix.project }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project: ${{ inputs.project && fromJSON(format('["{0}"]', inputs.project)) || fromJSON('["backend", "frontend"]') }}
        include:
          - project: backend
            cache-path: 'backend/pnpm-lock.yaml'
            build-command: 'pnpm -w run build'
          - project: frontend
            cache-path: 'frontend/pnpm-lock.yaml'
            build-command: 'pnpm -w run build'

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: ${{ matrix.cache-path }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: ${{ matrix.build-command }}
